apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nvlink
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/issue-temporary-certificate: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nvlink.lol
      secretName: nvlink-apex-tls
  rules:
    - host: nvlink.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nvlink-web
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nvlink-www-redirect
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/permanent-redirect: https://nvlink.lol
    nginx.ingress.kubernetes.io/permanent-redirect-code: "308"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.nvlink.lol
      secretName: nvlink-www-tls
  rules:
    - host: www.nvlink.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nvlink-web
                port:
                  number: 80
---
